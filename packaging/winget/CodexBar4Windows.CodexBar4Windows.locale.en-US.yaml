ShortDescription: Windows tray app that surfaces agent quota and usage for Claude, Codex, Cursor, Copilot, Gemini, and other coding-AI providers.
Description: |
  CodexBar4Windows is a Tauri-based Windows port of the macOS CodexBar tray app.
  It shows live quota and usage data for a curated set of AI coding providers in a
  Mica-effect popup that opens from the system tray. Eleven providers ship at v1.0
  (Claude, Codex, Cursor, Copilot, Gemini, OpenRouter, Factory, DeepSeek, Moonshot,
  Z.ai, Venice); more land in follow-up releases.
